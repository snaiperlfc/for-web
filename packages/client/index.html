<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- STELLIS: viewport handling. Dropped viewport-fit=cover because it
         conflicts with apple-mobile-web-app-status-bar-style=default —
         cover tells iOS to give us the full physical screen including
         reserved system zones, then 100vh/100dvh report a height larger
         than visible, causing overflow at the bottom. Without `cover`,
         iOS reserves status bar + home indicator zones systemically and
         our viewport equals the visible area exactly. Works on iPhone 8
         (no notch), iPhone 14 Pro (Dynamic Island), Galaxy, etc. — iOS
         and Android Chrome both honor the same protocol. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- STELLIS: opaque status bar (was black-translucent). With
         black-translucent iOS overlays status text on our content,
         which requires safe-area-inset-top padding (~47-59px) and
         visually pushes the header way down. "default" reserves the
         status bar zone systemically — our viewport starts right
         below it, no extra padding needed, tighter layout. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Stellis" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#11141C" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="description" content="Личное небо. По приглашениям." />
    <link
      rel="shortcut icon"
      type="image/png"
      href="./public/assets/web/icon.ico"
    />
    <!-- iOS home-screen icon. The 192/512 PNGs already exist for Android
         manifest; iOS will pick the largest available and downscale. -->
    <link rel="apple-touch-icon" href="./public/assets/web/android-chrome-192x192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="./public/assets/web/android-chrome-192x192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="./public/assets/web/android-chrome-512x512.png" />
    <title>Stellis</title>
    <style>
      /* STELLIS: pre-mount loader so first hit (cold JS parse ~3s on mobile)
         doesn't show a black screen. SPA wipes #root content when it mounts,
         so #boot-screen vanishes automatically. */
      /* STELLIS: expose iOS safe-area insets as CSS variables so any component
         can opt-in: `padding-top: var(--stellis-safe-top)`. Defaults to 0 on
         non-notched devices. App-shell components use these; full-bleed
         backgrounds (3D auth scene) ignore them and paint edge-to-edge. */
      :root {
        --stellis-safe-top: env(safe-area-inset-top, 0px);
        --stellis-safe-right: env(safe-area-inset-right, 0px);
        --stellis-safe-bottom: env(safe-area-inset-bottom, 0px);
        --stellis-safe-left: env(safe-area-inset-left, 0px);
      }
      html, body { margin: 0; background: #11141C; color: #F4F1E8; }
      /* STELLIS: viewport height with safe fallbacks for the full range
         of devices we support — iPhone 8 (375×667, no notch, iOS 15),
         iPhone 14 Pro Max (430×932, Dynamic Island), Galaxy S21+
         (360×800), Pixel, etc.

         Order: 100% works everywhere when html has explicit height; 100vh
         is the legacy fallback; 100dvh is the modern dynamic viewport
         (supported iOS 15.4+, Chrome 108+, Samsung Internet 22+). Last
         declaration wins on browsers that understand it, so newer
         iPhones get dvh (correct visible area), older fall back to vh. */
      html {
        height: 100%;
      }
      body, #root {
        height: 100vh;
        height: 100dvh;
        min-height: 100vh;
        min-height: 100dvh;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
      }
      #root {
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
      }
      #boot-screen {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 20px;
        /* z-index: -1 keeps boot strictly behind SPA stacking context — even
           if a SPA card has translucent background, boot can't bleed through. */
        z-index: -1;
        background: radial-gradient(circle at 50% 40%, #1A1F2E 0%, #11141C 60%, #07090E 100%);
      }
      /* Once SPA bootstraps it sets body.spa-mounted — kill boot via CSS as a
         belt-and-braces backup even if JS removal path is interrupted. */
      body.spa-mounted #boot-screen { display: none !important; }
      #boot-screen .mark {
        font-size: 40px; font-weight: 700; letter-spacing: -2px;
        color: #F4F1E8;
        display: flex; align-items: center; gap: 4px;
      }
      #boot-screen .mark .star {
        color: #E5A857; font-size: 22px; margin-bottom: 12px;
        animation: stellisTwinkle 2s ease-in-out infinite;
      }
      #boot-screen .hint {
        font-size: 13px; color: #A8A399; letter-spacing: 4px; text-transform: uppercase;
      }
      @keyframes stellisTwinkle {
        0%, 100% { opacity: 0.5; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.15); }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="boot-screen">
      <div class="mark">stell<span class="star">✦</span>s</div>
      <div class="hint">загружается…</div>
    </div>
    <div id="root"></div>
    <div id="floating"></div>

    <script src="/src/index.tsx" type="module"></script>
  </body>
</html>
